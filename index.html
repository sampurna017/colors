<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Split</title>

<style>
body{margin:0;font-family:sans-serif;text-align:center;color:white;transition:0.5s;}
.menuTheme{background:#111;}
.easy{background:#003;}
.medium{background:#220;}
.hard{background:#200;}
.extreme{background:#000;}
.bossTheme{background:radial-gradient(circle,#111,#000);}

#game{width:95vw;max-width:520px;height:280px;margin:60px auto;border:2px solid white;position:relative;display:none;overflow:hidden;}

.block{width:30px;height:30px;position:absolute;bottom:0;}
.red{background:red;}
.blue{background:blue;}
.goal{background:lime;}
.spike{background:orange;clip-path:polygon(50% 0%,0% 100%,100% 100%);}
.platform{background:#888;height:10px;}
.portal{background:purple;border-radius:50%;}
.boss{background:white;width:40px;height:40px;}

#player{width:30px;height:30px;position:absolute;bottom:0;left:20px;border-radius:8px;}

button{padding:10px;margin:5px;background:#222;color:white;border:none;border-radius:6px;}

#levelSelect{display:none;max-width:500px;margin:auto;}
.levelBtn{width:45px;height:45px;margin:4px;position:relative;}
.check{position:absolute;top:2px;right:4px;color:lime;font-size:12px;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modalBox{background:#111;padding:20px;border:2px solid red;border-radius:8px;}

#finalPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;padding:30px;border:3px solid gold;}
</style>
</head>

<body class="menuTheme">

<h1>🎮 Color Split</h1>

<div id="menu">
<button onclick="showLevels()">🎯 Levels</button>
<button onclick="startGame(1)">▶️ Start</button>
</div>

<div id="levelSelect"></div>
<div id="hud"></div>
<div id="game"></div>

<div id="inGameMenu" style="display:none;">
<button onclick="restartGame()">🔄 Restart</button>
<button onclick="exitGame()">🚪 Exit</button>
</div>

<div id="gameOverModal" class="modal">
<div class="modalBox">
<h2>💀 Game Over</h2>
<button onclick="restartGame()">Restart</button>
<button onclick="exitGame()">Menu</button>
</div>
</div>

<div id="finalPopup">
<h2>🎉 You completed all 50 levels!</h2>
<button onclick="exitGame()">Menu</button>
</div>

<script>
let game=document.getElementById("game");
let player;

let x=20,y=0,vy=0;
let gravity=0.8;

let mode="blue";
let currentLevel=1;
let lives=3;
let running=false;
let blocks=[];

let completed = JSON.parse(localStorage.getItem("cs_levels")) || {};

/* 🎯 FIXED LEVELS (NO RANDOM) */
const levels = {
1:[{type:"red",x:150},{type:"goal",x:500}],
2:[{type:"blue",x:150},{type:"red",x:250},{type:"goal",x:500}],
3:[{type:"spike",x:200},{type:"blue",x:320},{type:"goal",x:520}],
4:[{type:"red",x:150},{type:"spike",x:250},{type:"blue",x:350},{type:"goal",x:520}],
5:[{type:"platform",x:200,y:60},{type:"goal",x:500}],
6:[{type:"portalA",x:150},{type:"portalB",x:400},{type:"goal",x:520}],
7:[{type:"spike",x:150},{type:"spike",x:250},{type:"goal",x:500}],
8:[{type:"platform",x:250,y:90},{type:"goal",x:520}],
9:[{type:"red",x:120},{type:"blue",x:240},{type:"spike",x:360},{type:"goal",x:520}],
10:[{type:"portalA",x:100},{type:"portalB",x:420},{type:"spike",x:250},{type:"goal",x:520}],

/* continue structured patterns */
49:[{type:"boss",x:250},{type:"goal",x:520}],
50:[{type:"boss",x:200},{type:"boss",x:350},{type:"goal",x:520}]
};

/* fill remaining levels deterministically */
for(let i=1;i<=50;i++){
 if(!levels[i]){
  levels[i]=[
   {type:"red",x:120},
   {type:"blue",x:240},
   {type:"spike",x:360},
   {type:"goal",x:520}
  ];
 }
}

/* THEME */
function setTheme(){
 document.body.className="";
 if(currentLevel<=12) document.body.classList.add("easy");
 else if(currentLevel<=24) document.body.classList.add("medium");
 else if(currentLevel<=36) document.body.classList.add("hard");
 else if(currentLevel<=48) document.body.classList.add("extreme");
 else document.body.classList.add("bossTheme");
}

/* MENU */
function showLevels(){
 document.getElementById("menu").style.display="none";
 let grid=document.getElementById("levelSelect");
 grid.style.display="block";
 grid.innerHTML="";

 for(let i=1;i<=50;i++){
  let btn=document.createElement("button");
  btn.className="levelBtn";
  btn.innerText=i;

  if(completed[i]){
   let mark=document.createElement("span");
   mark.className="check";
   mark.innerText="✔";
   btn.appendChild(mark);
  }

  btn.onclick=()=>startGame(i);
  grid.appendChild(btn);
 }
}

/* START */
function startGame(lvl){
 currentLevel=lvl;
 lives=3;

 document.getElementById("menu").style.display="none";
 document.getElementById("levelSelect").style.display="none";
 document.getElementById("inGameMenu").style.display="block";
 game.style.display="block";

 running=true;
 loadLevel();
}

function restartGame(){
 lives=3;
 running=true;
 document.getElementById("gameOverModal").style.display="none";
 loadLevel();
}

function exitGame(){
 running=false;
 game.style.display="none";
 document.getElementById("menu").style.display="block";
 document.getElementById("levelSelect").style.display="none";
 document.getElementById("inGameMenu").style.display="none";
 document.getElementById("gameOverModal").style.display="none";
 document.getElementById("finalPopup").style.display="none";
 document.body.className="menuTheme";
}

/* LOAD */
function loadLevel(){
 game.innerHTML='<div id="player"></div>';
 player=document.getElementById("player");

 x=20;y=0;vy=0;
 blocks=[];

 levels[currentLevel].forEach(b=>{
  let d=document.createElement("div");

  if(b.type==="platform"){
   d.className="block platform";
   d.style.bottom=b.y+"px";
  }else if(b.type==="portalA"||b.type==="portalB"){
   d.className="block portal";
  }else if(b.type==="boss"){
   d.className="block boss";
  }else{
   d.className="block "+b.type;
  }

  d.style.left=b.x+"px";
  game.appendChild(d);
  blocks.push({el:d,...b,dir:1});
 });

 setTheme();
 updateHUD();
}

/* LOOP */
setInterval(()=>{
 if(!running) return;

 vy+=gravity;
 y+=vy;
 if(y>0){y=0;vy=0;}

 blocks.forEach(b=>{
  if(b.type==="boss"){
   b.x+=b.dir*3;
   if(b.x>450||b.x<100) b.dir*=-1;
   b.el.style.left=b.x+"px";
  }
 });

 player.style.left=x+"px";
 player.style.bottom=y+"px";
 player.style.background=mode;

 check();
},30);

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
 if(!running) return;

 if(e.key==="ArrowRight") x+=6;
 if(e.key==="ArrowLeft") x-=6;
 if(e.key==="ArrowUp" && y===0) vy=-14;
 if(e.code==="Space") mode=mode==="blue"?"red":"blue";
});

/* COLLISION */
function hit(px,b){return Math.abs(px-b.x)<25;}

function check(){
 let portalA=null, portalB=null;

 blocks.forEach(b=>{
  if(b.type==="portalA") portalA=b;
  if(b.type==="portalB") portalB=b;
 });

 blocks.forEach(b=>{
  if(hit(x,b)){

   if(b.type==="goal"){
    completed[currentLevel]=true;
    localStorage.setItem("cs_levels",JSON.stringify(completed));

    currentLevel++;

    if(currentLevel>50){
     running=false;
     document.getElementById("finalPopup").style.display="block";
    }else loadLevel();
   }

   if(b.type==="portalA" && portalB) x=portalB.x;
   if(b.type==="spike"||b.type==="boss") damage();
   if(b.type==="red" && mode!=="red") damage();
   if(b.type==="blue" && mode!=="blue") damage();
  }
 });
}

function damage(){
 lives--;
 if(lives<=0){
  running=false;
  document.getElementById("gameOverModal").style.display="flex";
 }
 updateHUD();
}

function updateHUD(){
 document.getElementById("hud").innerText =
 "Level:"+currentLevel+" | Lives:"+lives;
}
</script>

</body>
</html>
