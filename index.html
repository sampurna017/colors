<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Split</title>

<style>
body{margin:0;font-family:sans-serif;text-align:center;color:white;transition:0.5s;}
.menuTheme{background:#111;}
.easy{background:#003;}
.medium{background:#220;}
.hard{background:#200;}
.extreme{background:#000;}
.boss{background:radial-gradient(circle,#111,#000);}

#game{width:95vw;max-width:520px;height:280px;margin:60px auto;border:2px solid white;position:relative;display:none;overflow:hidden;}

.block{width:30px;height:30px;position:absolute;bottom:0;}
.red{background:red;}
.blue{background:blue;}
.goal{background:lime;}
.spike{background:orange;clip-path:polygon(50% 0%,0% 100%,100% 100%);}

.platform{
 background:#888;
 height:10px;
}

.portal{
 background:purple;
 border-radius:50%;
}

.bossEnemy{
 background:white;
 width:40px;height:40px;
}

#player{width:30px;height:30px;position:absolute;bottom:0;left:20px;border-radius:8px;}

button{padding:10px;margin:5px;background:#222;color:white;border:none;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modalBox{background:#111;padding:20px;border:2px solid red;}

#finalPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;padding:30px;border:3px solid gold;}
</style>
</head>

<body class="menuTheme">

<h1>🎮 Color Split</h1>

<div id="menu">
<button onclick="startGame(1)">▶️ Start</button>
</div>

<div id="hud"></div>
<div id="game"></div>

<div id="inGameMenu" style="display:none;">
<button onclick="restartGame()">🔄 Restart</button>
<button onclick="exitGame()">🚪 Exit</button>
</div>

<div id="gameOverModal" class="modal">
<div class="modalBox">
<h2>💀 Game Over</h2>
<button onclick="restartGame()">Restart</button>
<button onclick="exitGame()">Menu</button>
</div>
</div>

<div id="finalPopup">
<h2>🎉 Completed All Levels!</h2>
<button onclick="exitGame()">Menu</button>
</div>

<script>
let game=document.getElementById("game");
let player;

let x=20,y=0,vy=0;
let gravity=0.8;

let mode="blue";
let currentLevel=1;
let lives=3;
let speed=6;

let running=false;
let blocks=[];

/* LEVEL DATA WITH NEW MECHANICS */
const levels = {

1:[{type:"red",x:150},{type:"goal",x:500}],

5:[
 {type:"platform",x:200,y:60},
 {type:"blue",x:300},
 {type:"goal",x:500}
],

10:[
 {type:"portalA",x:150},
 {type:"portalB",x:400},
 {type:"goal",x:520}
],

20:[
 {type:"platform",x:150,y:80},
 {type:"spike",x:300},
 {type:"goal",x:520}
],

49:[
 {type:"boss",x:300},
 {type:"goal",x:520}
],

50:[
 {type:"boss",x:250},
 {type:"boss",x:350},
 {type:"goal",x:520}
]
};

/* AUTO FILL REST */
for(let i=1;i<=50;i++){
 if(!levels[i]){
  levels[i]=[
   {type:["red","blue","spike"][Math.floor(Math.random()*3)],x:150},
   {type:["red","blue","spike"][Math.floor(Math.random()*3)],x:250},
   {type:"goal",x:520}
  ];
 }
}

/* THEME */
function setTheme(){
 if(currentLevel<=12) document.body.className="easy";
 else if(currentLevel<=24) document.body.className="medium";
 else if(currentLevel<=36) document.body.className="hard";
 else if(currentLevel<=48) document.body.className="extreme";
 else document.body.className="boss";
}

/* START */
function startGame(lvl){
 currentLevel=lvl;
 lives=3;

 document.getElementById("menu").style.display="none";
 document.getElementById("inGameMenu").style.display="block";
 game.style.display="block";

 running=true;
 loadLevel();
}

function restartGame(){
 lives=3;
 running=true;
 document.getElementById("gameOverModal").style.display="none";
 loadLevel();
}

function exitGame(){
 running=false;
 game.style.display="none";
 document.getElementById("menu").style.display="block";
 document.getElementById("inGameMenu").style.display="none";
 document.getElementById("gameOverModal").style.display="none";
 document.getElementById("finalPopup").style.display="none";
 document.body.className="menuTheme";
}

/* LOAD */
function loadLevel(){
 game.innerHTML='<div id="player"></div>';
 player=document.getElementById("player");

 x=20;y=0;vy=0;
 blocks=[];

 let data=levels[currentLevel];

 data.forEach(b=>{
  let d=document.createElement("div");

  if(b.type==="platform"){
   d.className="block platform";
   d.style.bottom=b.y+"px";
  }else if(b.type==="portalA"||b.type==="portalB"){
   d.className="block portal";
  }else if(b.type==="boss"){
   d.className="block bossEnemy";
  }else{
   d.className="block "+b.type;
  }

  d.style.left=b.x+"px";
  game.appendChild(d);
  blocks.push({el:d,...b,dir:1});
 });

 setTheme();
 updateHUD();
}

/* LOOP */
setInterval(()=>{
 if(!running) return;

 vy+=gravity;
 y+=vy;
 if(y>0){y=0;vy=0;}

 /* platform support */
 blocks.forEach(b=>{
  if(b.type==="platform"){
   if(Math.abs(x-b.x)<30 && y<=b.y){
    y=b.y;
    vy=0;
   }
  }

  if(b.type==="boss"){
   b.x+=b.dir*3;
   if(b.x>450||b.x<100) b.dir*=-1;
   b.el.style.left=b.x+"px";
  }
 });

 player.style.left=x+"px";
 player.style.bottom=y+"px";
 player.style.background=mode;

 check();
},30);

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
 if(!running) return;

 if(e.key==="ArrowRight") x+=speed;
 if(e.key==="ArrowLeft") x-=speed;
 if(e.key==="ArrowUp" && y===0) vy=-14;
 if(e.code==="Space") mode=mode==="blue"?"red":"blue";
});

/* COLLISION */
function hit(px,b){return Math.abs(px-b.x)<25;}

function check(){
 let portalA=null, portalB=null;

 blocks.forEach(b=>{
  if(b.type==="portalA") portalA=b;
  if(b.type==="portalB") portalB=b;
 });

 blocks.forEach(b=>{
  if(hit(x,b)){

   if(b.type==="goal"){
    currentLevel++;
    if(currentLevel>50){
     running=false;
     document.getElementById("finalPopup").style.display="block";
    }else loadLevel();
   }

   if(b.type==="portalA" && portalB){
    x=portalB.x;
   }

   if(b.type==="spike"||b.type==="boss"){
    damage();
   }

   if(b.type==="red" && mode!=="red") damage();
   if(b.type==="blue" && mode!=="blue") damage();
  }
 });
}

function damage(){
 lives--;
 if(lives<=0){
  running=false;
  document.getElementById("gameOverModal").style.display="flex";
 }
 updateHUD();
}

function updateHUD(){
 document.getElementById("hud").innerText =
 "Level:"+currentLevel+" | Lives:"+lives;
}
</script>

</body>
</html>
