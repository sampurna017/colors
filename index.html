<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Split</title>

<style>
body{margin:0;font-family:sans-serif;text-align:center;color:white;transition:0.5s;overflow:hidden;}
.menuTheme{background:linear-gradient(#0a0a0a,#1a1a2e);}
.easy{background:linear-gradient(#003,#0a5);}
.medium{background:linear-gradient(#220,#a60);}
.hard{background:linear-gradient(#200,#600);}
.extreme{background:#050505;}
.boss{background:radial-gradient(circle,#111,#000);}

#game{width:95vw;max-width:520px;height:280px;margin:60px auto;border:2px solid white;position:relative;display:none;}

.block{width:30px;height:30px;position:absolute;bottom:0;}
.red{background:red;}
.blue{background:blue;}
.goal{background:lime;}
.spike{background:orange;clip-path:polygon(50% 0%,0% 100%,100% 100%);}

#player{width:30px;height:30px;position:absolute;bottom:0;left:20px;border-radius:8px;}

button{padding:10px;margin:5px;border:none;border-radius:6px;background:#222;color:white;}

#levelSelect{display:none;}
.levelBtn{width:45px;height:45px;margin:4px;position:relative;}
.check{position:absolute;top:2px;right:4px;color:lime;}

.particle{position:absolute;width:6px;height:6px;border-radius:50%;animation:fade 0.6s forwards;}
@keyframes fade{to{opacity:0;transform:translateY(-20px);}}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modalBox{background:#111;padding:20px;border:2px solid red;}

#finalPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;padding:30px;border:3px solid gold;}

#controls{position:fixed;bottom:10px;width:100%;display:none;}
.ctrl{width:60px;height:60px;margin:5px;}
</style>
</head>

<body class="menuTheme">

<h1>🎮 Color Split</h1>

<div id="menu">
<button onclick="showLevels()">🎯 Levels</button>
<button onclick="startGame(1)">▶️ Start</button>
</div>

<div id="levelSelect"></div>
<div id="hud"></div>
<div id="game"></div>

<div id="inGameMenu" style="display:none;">
<button onclick="restartGame()">🔄 Restart</button>
<button onclick="exitGame()">🚪 Exit</button>
</div>

<div id="gameOverModal" class="modal">
<div class="modalBox">
<h2>💀 Game Over</h2>
<button onclick="restartGame()">Restart</button>
<button onclick="exitGame()">Menu</button>
</div>
</div>

<div id="finalPopup">
<h2>🎉 Congratulations!</h2>
<p>You completed all 50 levels!</p>
<button onclick="exitGame()">Menu</button>
</div>

<div id="controls">
<button class="ctrl" onclick="move(-1)">⬅️</button>
<button class="ctrl" onclick="jump()">⬆️</button>
<button class="ctrl" onclick="move(1)">➡️</button>
<button class="ctrl" onclick="switchColor()">🎨</button>
</div>

<script>
let game=document.getElementById("game");
let player;

let x=20,y=0,vy=0;
let gravity=0.8;

let mode="blue";
let level=1;
let currentLevel=1;
let lives=3;
let speed=7;

let running=false;
let blocks=[];

let completed = JSON.parse(localStorage.getItem("cs_levels")) || {};

/* SOUND */
function beep(f){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.frequency.value=f;
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),100);
}

/* EFFECTS */
function particles(px,py,color){
 for(let i=0;i<8;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.background=color;
  p.style.left=px+"px";
  p.style.bottom=py+"px";
  game.appendChild(p);
  setTimeout(()=>p.remove(),600);
 }
}

/* THEME */
function setTheme(t){
 document.body.className="";
 document.body.classList.add(t);
}
function getDifficulty(){
 if(currentLevel<=12) return "easy";
 if(currentLevel<=24) return "medium";
 if(currentLevel<=36) return "hard";
 if(currentLevel<=48) return "extreme";
 return "boss";
}

/* MENU */
function showLevels(){
 document.getElementById("menu").style.display="none";
 let grid=document.getElementById("levelSelect");
 grid.style.display="block";
 grid.innerHTML="";

 for(let i=1;i<=50;i++){
  let btn=document.createElement("button");
  btn.className="levelBtn";
  btn.innerText=i;

  if(completed[i]){
   let mark=document.createElement("span");
   mark.className="check";
   mark.innerText="✔";
   btn.appendChild(mark);
  }

  btn.onclick=()=>startGame(i);
  grid.appendChild(btn);
 }
}

/* START */
function startGame(lvl){
 currentLevel=lvl;
 level=lvl;
 lives=3;

 document.getElementById("menu").style.display="none";
 document.getElementById("levelSelect").style.display="none";
 document.getElementById("controls").style.display="block";
 document.getElementById("inGameMenu").style.display="block";
 game.style.display="block";

 running=true;
 loadLevel();
}

function restartGame(){
 lives=3;
 running=true;
 document.getElementById("gameOverModal").style.display="none";
 loadLevel(); // SAME LEVEL (FIXED)
}

function exitGame(){
 running=false;
 game.style.display="none";
 document.getElementById("menu").style.display="block";
 document.getElementById("controls").style.display="none";
 document.getElementById("inGameMenu").style.display="none";
 document.getElementById("levelSelect").style.display="none";
 document.getElementById("gameOverModal").style.display="none";
 document.getElementById("finalPopup").style.display="none";
 setTheme("menuTheme");
}

/* LEVEL */
function generateLevel(){
 let arr=[];
 for(let i=0;i<4;i++){
  let types=["red","blue","spike"];
  let t=types[Math.floor(Math.random()*types.length)];
  arr.push({type:t,x:120+i*60});
 }
 arr.push({type:"goal",x:500});
 return arr;
}

function loadLevel(){
 game.innerHTML='<div id="player"></div>';
 player=document.getElementById("player");

 x=20;y=0;vy=0;
 blocks=[];

 let data=generateLevel();

 data.forEach(b=>{
  let d=document.createElement("div");
  d.className="block "+b.type;
  d.style.left=b.x+"px";
  game.appendChild(d);
  blocks.push({el:d,...b});
 });

 setTheme(getDifficulty());
 updateHUD();
}

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
 if(!running) return;

 if(e.key==="ArrowRight") x+=speed;
 if(e.key==="ArrowLeft") x-=speed;
 if(e.key==="ArrowUp" && y===0){vy=-14;beep(500);}
 if(e.code==="Space") switchColor();
});

function move(d){x+=d*speed;}
function jump(){if(y===0){vy=-14;beep(500);}}
function switchColor(){
 mode=mode==="blue"?"red":"blue";
 player.style.background=mode;
}

/* LOOP */
setInterval(()=>{
 if(!running) return;

 vy+=gravity;
 y+=vy;
 if(y>0){y=0;vy=0;}

 player.style.left=x+"px";
 player.style.bottom=y+"px";

 check();
},30);

/* COLLISION */
function hit(px,b){return Math.abs(px-b.x)<25;}

function check(){
 blocks.forEach(b=>{
  if(hit(x,b)){

   if(b.type==="goal"){
    completed[currentLevel]=true;
    localStorage.setItem("cs_levels",JSON.stringify(completed));

    level++;
    currentLevel=level;

    if(level>50){
     running=false;
     document.getElementById("finalPopup").style.display="block";
    }else loadLevel();
   }

   if(b.type==="spike") damage();
   if(b.type==="red" && mode!=="red") damage();
   if(b.type==="blue" && mode!=="blue") damage();
  }
 });
}

/* DAMAGE */
function damage(){
 lives--;
 particles(x,y,"red");
 beep(200);

 if(lives<=0){
  running=false;
  document.getElementById("gameOverModal").style.display="flex";
 }

 updateHUD();
}

/* HUD */
function updateHUD(){
 document.getElementById("hud").innerText =
 "Level:"+currentLevel+" | "+getDifficulty().toUpperCase()+" | Lives:"+lives;
}
</script>

</body>
</html>
